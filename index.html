<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ──────────────────────────────────────────────────── -->
    <title>Soda La Rústica — Menús digitales para restaurantes LATAM</title>
    <meta name="description" content="Crea tu menú digital en minutos. QR para cada mesa, plantillas profesionales, analíticas en tiempo real. Gratis para empezar." />
    <meta name="theme-color" content="#e99a0e" />
    <meta name="color-scheme" content="light dark" />

    <!-- ── Open Graph — Facebook, WhatsApp, Telegram, LinkedIn ──────────── -->
    <meta property="og:type"         content="website" />
    <meta property="og:site_name"    content="Soda La Rústica" />
    <meta property="og:title"        content="Soda La Rústica — Menús digitales para restaurantes" />
    <meta property="og:description"  content="Crea tu menú digital en minutos. QR para cada mesa, plantillas profesionales, analíticas en tiempo real." />
    <meta property="og:image"        content="/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ── Twitter / X ───────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Soda La Rústica — Menús digitales" />
    <meta name="twitter:description" content="Crea tu menú digital en minutos para tu restaurante." />
    <meta name="twitter:image"       content="/og-default.png" />

    <!-- ── Favicon & icons ──────────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png"     href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon"                      href="/icons/icon-192.png" />

    <!-- ── PWA manifest ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── iOS PWA meta ─────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title"            content="Menú Digital" />
    <meta name="mobile-web-app-capable"                content="yes" />

    <!-- ── Performance: preconnect to critical origins ──────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Core fonts used across multiple templates ────────────────────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;900&family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
